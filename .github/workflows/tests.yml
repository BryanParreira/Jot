# PR-time test runner.

name: Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'scribe/**'
  push:
    branches: [main]
    paths:
      - 'scribe/**'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: xcodebuild test (macOS)
    runs-on: macos-15
    timeout-minutes: 25
    defaults:
      run:
        working-directory: scribe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: |
          xcodebuild test \
            -project Scribe.xcodeproj \
            -scheme Scribe \
            -destination 'platform=macOS' \
            -skip-testing:ScribeTests/FoundationModelDriftEvalTests \
            CODE_SIGNING_ALLOWED=NO
